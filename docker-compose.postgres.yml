version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: palmo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: palmo_calculator
      POSTGRES_USER: palmo
      POSTGRES_PASSWORD: palmo_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palmo -d palmo_calculator"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcjonalnie: pgAdmin do zarządzania
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: palmo-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@palmo-trans.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
